<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>주민등록등본 신청서</title>
  <style>
    .section {border:1px solid #e5e7eb; padding:16px; border-radius:10px; margin:16px 0;}
    .row {display:grid; grid-template-columns: 160px 1fr; gap:12px; align-items:center; margin:10px 0;}
    .hint {color:#6b7280; font-size:12px;}
    .inline {display:flex; gap:8px; align-items:center;}
    .subtle {color:#374151; font-weight:600; margin:8px 0}
    fieldset {border:0; padding:0; margin:0}
    .disabled {opacity: .6; pointer-events: none;}
  </style>
</head>
<body>
<main>
  <h2>주민등록등본 교부 신청</h2>

  <form th:action="@{/residentregistration/apply}" th:object="${form}" method="post" id="rr-form">

    <!-- ① 신청인 기본정보 -->
    <section class="section">
      <h3 class="subtle">① 신청인 기본정보</h3>

      <div class="row">
        <label for="applicantName">성명</label>
        <div th:replace="~{paperless/writer/fragments/components :: Text('성명', 'applicantName', *{applicantName}, '홍길동')}"></div>
      </div>

      <div class="row">
        <label>주민등록번호</label>
        <div th:replace="~{paperless/writer/fragments/components :: Rrn('주민등록번호', 'rrnFront', 'rrnBack', *{rrnFront}, *{rrnBack})}"></div>
      </div>

      <div class="row">
        <label for="address">주소</label>
        <input type="text" id="address" th:field="*{address}" placeholder="도로명 주소" required />
        <div class="hint">※ 향후 도로명 주소 API 연동 예정</div>
      </div>

      <div class="row">
        <label for="phone">연락처</label>
        <input type="tel" id="phone" th:field="*{phone}" placeholder="010-1234-5678" pattern="^0\d{1,2}-\d{3,4}-\d{4}$" required />
      </div>

      <div class="row">
        <label>수수료 면제</label>
        <div class="inline">
          <label><input type="radio" th:field="*{feeExempt}" value="true"> 예</label>
          <label><input type="radio" th:field="*{feeExempt}" value="false"> 아니오</label>
        </div>
      </div>

      <div class="row" th:if="*{feeExempt}">
        <label for="feeExemptReason">면제 사유</label>
        <input type="text" id="feeExemptReason" th:field="*{feeExemptReason}" placeholder="면제 사유를 입력하세요" />
      </div>
    </section>

    <!-- ② 등본 포함 범위 -->
    <section class="section">
      <h3 class="subtle">② 등본 포함 범위</h3>

      <div class="row">
        <label>등본사항 전부 포함</label>
        <div class="inline">
          <label><input type="radio" name="includeAll" value="ALL" th:field="*{includeAll}"> 예(전부포함)</label>
          <label><input type="radio" name="includeAll" value="PART" th:field="*{includeAll}"> 아니오(부분선택)</label>
        </div>
      </div>

      <fieldset id="partialBox">
        <div class="row">
          <label>주소 변동사항</label>
          <div>
            <div class="inline">
              <label><input type="radio" th:field="*{addressHistoryMode}" value="ALL"> 전체 포함</label>
              <label class="inline">
                <input type="radio" th:field="*{addressHistoryMode}" value="RECENT"> 최근
                <input type="number" min="1" max="99" style="width:72px" th:field="*{addressHistoryYears}"> 년 포함
              </label>
              <label class="inline">
                <input type="radio" th:field="*{addressHistoryMode}" value="CUSTOM"> 직접 입력(추후 상세 지정)
              </label>
            </div>
            <div class="hint">※ ‘최근 N년’ 선택 시 N을 입력하세요.</div>
          </div>
        </div>

        <div class="row">
          <label>세대 구성사유</label>
          <label class="inline">
            <input type="checkbox" th:field="*{includeHouseholdReason}"> 포함
          </label>
        </div>
        <div class="row">
          <label>세대 구성일자</label>
          <label class="inline">
            <input type="checkbox" th:field="*{includeHouseholdDate}"> 포함
          </label>
        </div>

        <div class="row">
          <label>발생일/신고일</label>
          <label class="inline">
            <input type="checkbox" th:field="*{includeOccurReportDates}"> 포함
          </label>
        </div>

        <div class="row">
          <label>변동사유</label>
          <div class="inline" style="flex-wrap:wrap;">
            <label><input type="radio" th:field="*{changeReasonScope}" value="NONE"> 미포함</label>
            <label><input type="radio" th:field="*{changeReasonScope}" value="HOUSEHOLD"> 세대만</label>
            <label><input type="radio" th:field="*{changeReasonScope}" value="ALL_MEMBERS"> 세대원 전부</label>
          </div>
        </div>

        <div class="row">
          <label>교부대상자 외 이름</label>
          <label class="inline">
            <input type="checkbox" th:field="*{includeOtherNames}"> 세대주·세대원·외국인 등 이름 포함
          </label>
        </div>

        <div class="row">
          <label>주민등록번호 뒷자리</label>
          <div class="inline">
            <label><input type="radio" th:field="*{rrnBackInclusion}" value="NONE"> 미포함</label>
            <label><input type="radio" th:field="*{rrnBackInclusion}" value="SELF"> 본인만</label>
            <label><input type="radio" th:field="*{rrnBackInclusion}" value="HOUSEHOLD"> 세대원도</label>
          </div>
        </div>

        <div class="row">
          <label>세대주와의 관계</label>
          <label class="inline">
            <input type="checkbox" th:field="*{includeRelationshipToHead}"> 포함
          </label>
        </div>

        <div class="row">
          <label>동거인</label>
          <label class="inline">
            <input type="checkbox" th:field="*{includeCohabitants}"> 포함
          </label>
        </div>
      </fieldset>
    </section>

    <!-- ③ 신청인 서명 -->
    <section class="section">
      <h3 class="subtle">③ 신청인 서명</h3>

      <div class="row">
        <label>서명 이미지</label>
        <div class="inline" style="align-items:flex-start; gap:16px;">
          <img id="signPreview" alt="서명 미리보기" style="width:220px; height:120px; border:1px solid #e5e7eb; background:#fff; object-fit:contain;" />
          <div class="inline" style="flex-direction:column; align-items:flex-start; gap:8px;">
            <button type="button" id="openSignPopup">서명하기(팝업)</button>
            <button type="button" id="clearSignature">서명 지우기</button>
            <div class="hint">※ 팝업에서 저장하면 이곳에 미리보기가 표시됩니다.</div>
          </div>
        </div>
      </div>

      <input type="hidden" id="signatureBase64" name="signatureBase64" th:field="*{signatureBase64}" />
    </section>

    <div class="inline" style="justify-content:flex-end; gap:10px;">
      <button type="submit">신청서 제출</button>
      <button type="reset">초기화</button>
    </div>
  </form>
</main>

<script th:inline="javascript">
  // 전부포함 선택 시 나머지 옵션 비활성화
  const includeAllRadios = document.querySelectorAll('input[name="includeAll"]');
  const partialBox = document.getElementById('partialBox');
  function refreshPartial() {
    const selected = [...includeAllRadios].find(r => r.checked)?.value;
    if (selected === 'ALL') {
      partialBox.classList.add('disabled');
      [...partialBox.querySelectorAll('input,select,button,textarea')].forEach(el => {
        el.setAttribute('disabled','disabled');
      });
    } else {
      partialBox.classList.remove('disabled');
      [...partialBox.querySelectorAll('input,select,button,textarea')].forEach(el => {
        el.removeAttribute('disabled');
      });
    }
  }
  includeAllRadios.forEach(r => r.addEventListener('change', refreshPartial));
  window.addEventListener('DOMContentLoaded', refreshPartial);

  // 서명 팝업 연동 (컨트롤러 매핑 사용)
  const signPreview = document.getElementById('signPreview');
  const signatureBase64 = document.getElementById('signatureBase64');
  const openBtn = document.getElementById('openSignPopup');
  const clearBtn = document.getElementById('clearSignature');
  let signPopup;

  const signUrl = /*[[@{/residentregistration/sign}]]*/ '/residentregistration/sign';

  openBtn?.addEventListener('click', () => {
    const w = 480, h = 360;
    const left = Math.round((window.screen.width - w) / 2);
    const top = Math.round((window.screen.height - h) / 2);
    signPopup = window.open(signUrl, 'signPopup',
      `width=${w},height=${h},left=${left},top=${top},resizable=no,scrollbars=no`);
    if (!signPopup) {
      alert('팝업이 차단되었습니다. 팝업 허용 후 다시 시도하세요.');
    }
  });

  window.addEventListener('message', (e) => {
    const msg = e.data;
    if (!msg || msg.type !== 'SIGN_DONE' || !msg.dataUrl) return;
    signPreview.src = msg.dataUrl;
    signatureBase64.value = msg.dataUrl;
    try { signPopup && signPopup.close(); } catch (_) {}
  });

  clearBtn?.addEventListener('click', () => {
    signPreview.removeAttribute('src');
    signatureBase64.value = '';
  });
</script>
</body>
</html>
